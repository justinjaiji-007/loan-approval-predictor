<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreditRisk AI - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth glowing animations */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }
        .glow-bg {
            animation: pulse-glow 8s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden font-sans">

    <div class="absolute top-1/4 -left-32 w-96 h-96 bg-blue-600/20 rounded-full blur-3xl glow-bg"></div>
    <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-violet-600/20 rounded-full blur-3xl glow-bg" style="animation-delay: -4s;"></div>

    <div class="bg-slate-900/60 backdrop-blur-xl p-8 rounded-2xl border border-slate-800/80 max-w-md w-full shadow-2xl relative z-10 transition-all duration-300 hover:border-slate-700/50">
        
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-violet-400 bg-clip-text text-transparent flex items-center gap-2">
                <span>💰</span> CreditRisk AI
            </h1>
            <span class="text-[10px] uppercase tracking-widest bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2 py-0.5 rounded-full font-semibold">
                v2.0 Live
            </span>
        </div>
        <p class="text-xs text-slate-400 mb-6">Edge-computed automated underwriting risk assessment engine.</p>
        
        <hr class="border-slate-800 mb-6">

        <form id="loanForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Applicant Age</label>
                <input type="number" id="age" value="30" min="18" max="100" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-slate-100 shadow-inner outline-hidden focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Annual Income (₹)</label>
                <input type="number" id="income" value="550000" min="0" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-slate-100 shadow-inner outline-hidden focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Credit Score (300 - 850)</label>
                <input type="number" id="creditScore" value="650" min="300" max="850" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-slate-100 shadow-inner outline-hidden focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Requested Loan Amount (₹)</label>
                <input type="number" id="loanAmount" value="200000" min="0" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-slate-100 shadow-inner outline-hidden focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all" required>
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-600 hover:from-blue-500 hover:via-indigo-500 hover:to-violet-500 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 shadow-lg shadow-indigo-600/20 cursor-pointer active:scale-[0.99] mt-6 text-sm">
                Evaluate Credit Risk
            </button>
        </form>

        <div id="resultBox" class="mt-6 p-4 rounded-xl border opacity-0 scale-95 pointer-events-none transition-all duration-300 flex flex-col items-center justify-center gap-2 text-center">
            <div id="resultIcon" class="text-2xl"></div>
            <p id="resultText" class="font-bold text-sm tracking-wide"></p>
            <p id="resultSubtext" class="text-xs text-slate-400 max-w-[90%]"></p>
        </div>
    </div>

    <script>
        document.getElementById('loanForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Extract numeric inputs
            const age = parseFloat(document.getElementById('age').value);
            const income = parseFloat(document.getElementById('income').value);
            const creditScore = parseFloat(document.getElementById('creditScore').value);
            const loanAmount = parseFloat(document.getElementById('loanAmount').value);

            // Replicate model normalization matrices (Scaled up for INR input matching)
            const creditNormalized = (creditScore - 300) / 550;
            const incomeNormalized = income / 1500000;
            const loanNormalized = loanAmount / 800000;

            // Generate Risk Score metric
            const score = (creditNormalized * 0.5) + (incomeNormalized * 0.3) - (loanNormalized * 0.2);

            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultText = document.getElementById('resultText');
            const resultSubtext = document.getElementById('resultSubtext');

            // Reset dynamic utility classes
            resultBox.className = "mt-6 p-4 rounded-xl border transition-all duration-300 flex flex-col items-center justify-center gap-1.5 text-center opacity-100 scale-100";

            // Conditional rendering logic based on metrics
            if (score > 0.3) {
                resultBox.classList.add('bg-emerald-950/40', 'border-emerald-500/30', 'shadow-lg', 'shadow-emerald-950/20');
                resultIcon.innerHTML = "⚡";
                resultText.className = "font-bold text-sm text-emerald-400 tracking-wide";
                resultText.innerHTML = "APPLICATION APPROVED";
                resultSubtext.innerHTML = "Applicant profile meets automatic low-risk underwriting metrics.";
            } else {
                resultBox.classList.add('bg-rose-950/40', 'border-rose-500/30', 'shadow-lg', 'shadow-rose-950/20');
                resultIcon.innerHTML = "🔒";
                resultText.className = "font-bold text-sm text-rose-400 tracking-wide";
                resultText.innerHTML = "APPLICATION REJECTED";
                resultSubtext.innerHTML = "Risk index exceeds acceptable threshold rules. Manual review required.";
            }
        });
    </script>
</body>
</html>
